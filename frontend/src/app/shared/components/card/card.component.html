<div
  class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden hover:shadow-md transition duration-200 w-[320px]"
>
  <!-- Image -->
  <div class="relative h-44 bg-slate-900 flex items-center justify-center">
    <span
      class="absolute top-3 left-3 bg-emerald-100 text-emerald-700 text-xs font-semibold px-3 py-1 rounded-full"
    >
      Available
    </span>

    <span
      class="absolute top-3 right-3 bg-white text-slate-700 text-xs font-bold w-8 h-8 rounded-full flex items-center justify-center"
    >
      98
    </span>

    <div class="text-center text-white">
      <div class="text-4xl mb-2">🏗️</div>
      <p class="text-sm opacity-80">Industrial Asset</p>
    </div>
  </div>

  <!-- Content -->
  <div class="p-4">
    <h3 class="text-lg font-bold text-slate-900">
      {{ title }}
    </h3>

    <p class="text-sm text-slate-500 mt-1">
      {{ subtitle }}
    </p>

    <div class="flex items-center gap-2 mt-3 text-sm text-yellow-500">
      ⭐ 4.8
      <span class="text-slate-500"> • 53 Rentals </span>
    </div>

    <div class="mt-4">
      <span class="text-3xl font-bold text-slate-900"> $560 </span>

      <span class="text-slate-500"> /day </span>
    </div>

    <div class="mt-5 flex gap-3">
      <button
        class="flex-1 border border-slate-300 rounded-lg py-2 text-sm hover:bg-slate-100"
      >
        Details
      </button>

      <button
        class="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm hover:bg-blue-700"
      >
        Book Now
      </button>
    </div>
  </div>
</div>
