<div
  class="border-2 border-dashed rounded-xl p-8 text-center transition-colors duration-200 cursor-pointer"
  [ngClass]="isDragging ? 'border-blue-500 bg-blue-50' : 'border-slate-300 bg-slate-50 hover:bg-slate-100'"
>
  <div class="text-slate-500 mb-2">
    <svg class="mx-auto h-12 w-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
    </svg>
  </div>
  <p class="text-sm font-medium text-slate-700">اسحب وأفلت الملفات هنا</p>
  <p class="text-xs text-slate-500 mt-1">أو اضغط لتصفح الملفات</p>
</div>
