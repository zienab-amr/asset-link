<div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
  <h3 class="text-lg font-semibold mb-5">
    {{ title }}
  </h3>

  <div class="flex items-center gap-6">
    <!-- Fake QR -->
    <div
      class="w-28 h-28 border-4 border-slate-900 rounded-lg flex items-center justify-center text-5xl"
    >
      ▦
    </div>

    <div>
      <p class="font-medium">Asset ID</p>

      <p class="text-slate-500 mt-1">

      >
        Download QR
      </button>
    </div>
  </div>
</div>
