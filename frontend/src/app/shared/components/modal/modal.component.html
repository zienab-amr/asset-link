<div
  *ngIf="isOpen"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
  (click)="onBackdropClick()"
>
  <div
    [ngClass]="modalWidth"
    class="flex max-h-[90vh] w-full flex-col overflow-hidden rounded-2xl bg-white shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div
      class="flex items-center justify-between border-b border-gray-200 px-8 py-6"
    >
      <div class="flex items-center gap-4">

        <!-- Icon -->
        <div
  class="flex h-12 w-12 items-center justify-center rounded-full bg-blue-50 text-xl"
>
  {{ icon }}
</div>

        <!-- Title -->
        <div>
          <h2 class="text-2xl font-semibold text-gray-900">
            {{ title }}
          </h2>

          <p
            *ngIf="subtitle"
            class="mt-1 text-base text-gray-500"
          >
            {{ subtitle }}
          </p>
        </div>

      </div>

      <button
        *ngIf="showCloseButton"
        (click)="closeModal()"
        class="rounded-full p-2 text-gray-500 hover:bg-gray-100"
      >
        ✕
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 overflow-y-auto p-8">
      <ng-content></ng-content>
    </div>

    <!-- Footer -->
   <div
  class="flex items-center justify-between border-t border-gray-200 bg-white px-8 py-5"
>
  <button
    *ngIf="showCancelButton"
    (click)="onCancel()"
    class="rounded-lg px-6 py-3 text-lg font-medium text-gray-600 hover:bg-gray-100"
  >
    {{ cancelText }}
  </button>

  <button
    *ngIf="showConfirmButton"
    (click)="onConfirm()"
   class="rounded-xl bg-primary px-8 py-3 text-lg font-semibold text-white transition-colors hover:opacity-90"
  >
    {{ confirmText }}
  </button>
</div>

  </div>
</div>
