<div class="flex items-center justify-between border-t border-gray-200 bg-white px-6 py-4">

  <!-- Left Text -->
  <p class="text-sm text-gray-500">
    Showing
    <span class="font-semibold text-gray-900">{{ showing }}</span>
    of
    <span class="font-semibold text-gray-900">{{ total }}</span>
    {{ itemName }}
  </p>

  <!-- Pagination -->
  <div class="flex items-center gap-2">

    <!-- Previous -->
    <button
      (click)="previous()"
      [disabled]="currentPage === 1"
      class="flex h-10 w-10 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-400 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 19l-7-7 7-7"
        />
      </svg>
    </button>

    <!-- Current Page -->
    <div
      class="flex h-10 w-10 items-center justify-center rounded-full bg-primary text-sm font-semibold text-white"
    >
      {{ currentPage }}
    </div>

    <!-- Next -->
    <button
      (click)="next()"
      [disabled]="currentPage === totalPages"
      class="flex h-10 w-10 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-400 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9 5l7 7-7 7"
        />
      </svg>
    </button>

  </div>

</div>
