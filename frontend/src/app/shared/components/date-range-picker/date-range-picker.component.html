<div class="grid grid-cols-1 gap-6 md:grid-cols-2">

  <!-- Start Date -->
  <div>

    <label class="mb-2 block text-sm font-medium text-gray-700">
      {{ startLabel }}

      <span
        *ngIf="required"
        class="text-red-500"
      >
        *
      </span>
    </label>

    <div class="relative">

      <input
        type="date"
        [(ngModel)]="startDate"
        (change)="onStartDateChange()"
        class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 outline-none transition focus:border-primary"
      />

      <div
        class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"
      >
        📅
      </div>

    </div>

  </div>

  <!-- End Date -->
  <div>

    <label class="mb-2 block text-sm font-medium text-gray-700">

      {{ endLabel }}

      <span
        *ngIf="required"
        class="text-red-500"
      >
        *
      </span>

    </label>

    <div class="relative">

      <input
        type="date"
        [(ngModel)]="endDate"
        [min]="startDate"
        (change)="onEndDateChange()"
        class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 outline-none transition focus:border-primary"
      />

      <div
        class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"
      >
        📅
      </div>

    </div>

  </div>

</div>

<!-- Validation -->

<p
  *ngIf="errorMessage"
  class="mt-3 text-sm text-red-600"
>
  {{ errorMessage }}
</p>
