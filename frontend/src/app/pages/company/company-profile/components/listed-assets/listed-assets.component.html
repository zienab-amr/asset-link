<div class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">

  <!-- Header -->

  <div class="flex items-center justify-between border-b border-slate-200 px-8 py-6">

    <div>
      <h2 class="text-[30px] font-semibold text-slate-900">
        Listed Assets
      </h2>

      <p class="mt-1 text-sm text-slate-500">
        5 active assets available for rental
      </p>
    </div>

    <app-button variant="primary">
      + Add Asset
    </app-button>

  </div>

  <!-- Table -->

  <div class="overflow-x-auto">

    <table class="min-w-full">

      <thead>

        <tr class="border-b border-slate-200 bg-slate-50">

          <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
            Asset
          </th>

          <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
            Category
          </th>

          <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
            Daily Rate
          </th>

          <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
            Location
          </th>

          <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
            Status
          </th>

          <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
            Rating
          </th>

        </tr>

      </thead>

      <tbody>

        <tr
          *ngFor="let asset of assets"
          class="border-b border-slate-100 transition-all duration-200 hover:bg-slate-50 last:border-0">

          <!-- Asset -->

          <td class="px-6 py-6">

            <div class="flex items-center gap-4">

              <div
                class="flex h-12 w-12 items-center justify-center rounded-full bg-slate-100">

                <lucide-icon
                  [img]="Package"
                  class="h-5 w-5 text-slate-500">
                </lucide-icon>

              </div>

              <span class="font-medium text-slate-900">

                {{ asset.name }}

              </span>

            </div>

          </td>

          <!-- Category -->

          <td class="px-6 py-6 text-slate-600">

            {{ asset.category }}

          </td>

          <!-- Daily Rate -->

          <td class="px-6 py-6">

            <span class="font-semibold text-slate-900">

              {{ asset.rate }}

            </span>

            <span class="text-slate-500">

              /day

            </span>

          </td>

          <!-- Location -->

          <td class="px-6 py-6">

            <div class="flex items-center gap-2">

              <lucide-icon
                [img]="MapPin"
                class="h-4 w-4 text-slate-400">
              </lucide-icon>

              <span class="text-slate-600">

                {{ asset.location }}

              </span>

            </div>

          </td>

          <!-- Status -->

          <td class="px-6 py-6">

            <span
              class="inline-flex rounded-full px-3 py-1 text-sm font-medium"
              [ngClass]="{

                'bg-blue-100 text-blue-700':
                asset.status==='Rented',

                'bg-green-100 text-green-700':
                asset.status==='Available',

                'bg-orange-100 text-orange-700':
                asset.status==='Maintenance'

              }">

              {{ asset.status }}

            </span>

          </td>

          <!-- Rating -->

          <td class="px-6 py-6">

            <div class="flex items-center gap-2">

              <lucide-icon
                [img]="Star"
                class="h-4 w-4 fill-yellow-400 text-yellow-400">
              </lucide-icon>

              <span class="font-medium">

                {{ asset.rating }}

              </span>

            </div>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
