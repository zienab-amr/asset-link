<div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">

    <h2 class="mb-6 text-[18px] font-semibold text-slate-900">
        Contact
    </h2>

    <div class="space-y-5">

        <!-- Email -->

        <div class="flex items-start gap-4">

            <div
                class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 text-slate-500">

                ✉️

            </div>

            <p class="pt-2 text-[16px] text-slate-700">

                {{ contact.email }}

            </p>

        </div>

        <!-- Phone -->

        <div class="flex items-start gap-4">

            <div
                class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 text-slate-500">

                📞

            </div>

            <p class="pt-2 text-[16px] text-slate-700">

                {{ contact.phone }}

            </p>

        </div>

        <!-- Website -->

        <div class="flex items-start gap-4">

            <div
                class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 text-slate-500">

                🌐

            </div>

            <p class="pt-2 text-[16px] text-slate-700">

                {{ contact.website }}

            </p>

        </div>

        <!-- Address -->

        <div class="flex items-start gap-4">

            <div
                class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 text-slate-500">

                📍

            </div>

            <p class="text-[16px] leading-7 text-slate-700">

                {{ contact.address }}

            </p>

        </div>

    </div>

</div>
