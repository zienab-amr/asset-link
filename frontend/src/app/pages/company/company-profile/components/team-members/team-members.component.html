<div class="rounded-3xl border border-slate-200 bg-white shadow-sm">

    <!-- Header -->

    <div class="flex items-center justify-between border-b border-slate-200 p-6">

        <div>

            <h2 class="text-[18px] font-semibold text-slate-900">
                Team Members
            </h2>

            <p class="mt-1 text-sm text-slate-500">
                5 members with platform access
            </p>

        </div>

        <app-button variant="primary">

            + Invite Member

        </app-button>

    </div>
        <!-- Table -->

    <div class="overflow-x-auto">

        <table class="min-w-full">

            <thead>

                <tr class="border-b border-slate-200 bg-slate-50">

                    <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
                        Member
                    </th>

                    <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
                        Title
                    </th>

                    <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
                        Email
                    </th>

                    <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
                        Role
                    </th>

                    <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
                        Joined
                    </th>

                </tr>

            </thead>

            <tbody>

                <tr
                    *ngFor="let member of members"
                    class="border-b border-slate-100 last:border-b-0 hover:bg-slate-50 transition">

                    <!-- Member -->

                    <td class="px-6 py-5">

                        <div class="flex items-center gap-4">

                            <div
                                class="flex h-11 w-11 items-center justify-center rounded-full text-sm font-semibold text-white"
                                [ngClass]="member.color">

                                {{ member.initials }}

                            </div>

                            <span class="font-medium text-slate-900">

                                {{ member.name }}

                            </span>

                        </div>

                    </td>

                    <!-- Title -->

                    <td class="px-6 py-5 text-slate-600">

                        {{ member.title }}

                    </td>

                    <!-- Email -->

                    <td class="px-6 py-5 text-slate-600">

                        {{ member.email }}

                    </td>

                    <!-- Role -->

                    <td class="px-6 py-5">

                        <span
                            class="inline-flex rounded-full px-3 py-1 text-sm font-medium"
                            [ngClass]="{
                              'bg-blue-100 text-blue-700': member.role === 'Admin',
                              'bg-emerald-100 text-emerald-700': member.role === 'Member',
                              'bg-slate-100 text-slate-700': member.role === 'Viewer'
                            }">

                            {{ member.role }}

                        </span>

                    </td>

                    <!-- Joined -->

                    <td class="px-6 py-5 text-slate-600">

                        {{ member.joined }}

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
