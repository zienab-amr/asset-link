<div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">

    <h2 class="mb-6 text-[18px] font-semibold text-slate-900">
        Account Status
    </h2>

    <div class="space-y-4">

        <div
            *ngFor="let item of items"
            class="flex items-center justify-between">

            <span class="text-[16px] text-slate-700">
                {{ item.title }}
            </span>

            <span
                class="flex items-center gap-2 text-sm font-medium"
                [ngClass]="item.completed ? 'text-emerald-600' : 'text-orange-500'">

                <!-- لو Lucide شغالة -->
                <lucide-icon
                    *ngIf="item.completed"
                    name="check-circle-2"
                    class="h-5 w-5">
                </lucide-icon>

                <lucide-icon
                    *ngIf="!item.completed"
                    name="triangle-alert"
                    class="h-5 w-5">
                </lucide-icon>

                {{ item.status }}

            </span>

        </div>

    </div>

    <div class="mt-6">

        <button
            class="h-12 w-full rounded-full border border-slate-300 bg-white text-[16px] font-medium text-slate-700 transition hover:bg-slate-50">
            Complete Profile
        </button>

    </div>

</div>
