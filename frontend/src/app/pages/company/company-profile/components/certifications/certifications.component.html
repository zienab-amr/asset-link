<div class="rounded-3xl border border-slate-200 bg-white p-7 shadow-sm">

    <h2 class="mb-7 text-[18px] font-semibold text-slate-900">
        Certifications & Compliance
    </h2>

    <div class="space-y-5">

        <div
            *ngFor="let item of certifications"
            class="flex items-center justify-between rounded-2xl border border-slate-100 p-5">

            <div class="flex items-center gap-4">

               <div
  class="flex h-10 w-10 items-center justify-center rounded-full"
  [ngClass]="item.verified ? 'bg-emerald-50' : 'bg-orange-50'"
>

  <lucide-icon
    *ngIf="item.verified"
    name="check-circle-2"
    class="h-5 w-5 text-emerald-600">
  </lucide-icon>

  <lucide-icon
    *ngIf="!item.verified"
    name="clock-3"
    class="h-5 w-5 text-orange-500">
  </lucide-icon>

</div>
                <div>

                    <h3 class="text-[17px] font-medium text-slate-900">
                        {{ item.name }}
                    </h3>

                    <p class="mt-1 text-sm text-slate-500">
                        {{ item.issuer }} • {{ item.expiry }}
                    </p>

                </div>

            </div>

           <span
  class="rounded-full px-4 py-2 text-sm font-medium"
  [ngClass]="
    item.verified
      ? 'bg-emerald-50 text-emerald-600'
      : 'bg-orange-50 text-orange-600'
  "
>
  ● {{ item.verified ? 'Verified' : 'Pending' }}
</span>

        </div>

    </div>

</div>
