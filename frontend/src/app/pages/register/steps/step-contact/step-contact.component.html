<form [formGroup]="form" (ngSubmit)="onNext()" class="space-y-4">

  <!-- Step Header -->
  <div class="mb-4">
    <h2 class="text-lg font-bold text-slate-900">Contact Details</h2>
    <p class="text-xs text-slate-500">Enter the contact information for the account administrator.</p>
  </div>

  <!-- Grid: First Name & Last Name -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <!-- First Name -->
    <div>
      <label for="firstName" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
        First Name <span class="text-red-500">*</span>
      </label>
      <div class="relative">
        <div class="absolute inset-y-0 right-0 rtl:right-0 rtl:left-auto left-0 pl-3 rtl:pr-3.5 flex items-center pointer-events-none text-slate-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <input
          id="firstName"
          type="text"
          formControlName="firstName"
          placeholder="e.g., Marcus"
          class="w-full pr-10 rtl:pr-10 rtl:pl-4 pl-4 py-2.5 text-sm border rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 placeholder-slate-400"
          [class.border-red-400]="form.get('firstName')?.touched && form.get('firstName')?.invalid"
          [class.border-slate-200]="!(form.get('firstName')?.touched && form.get('firstName')?.invalid)"
        />
      </div>
      <p *ngIf="form.get('firstName')?.touched && form.get('firstName')?.invalid" class="text-xs text-red-500 mt-1">
        First name is required.
      </p>
    </div>

    <!-- Last Name -->
    <div>
      <label for="lastName" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
        Last Name <span class="text-red-500">*</span>
      </label>
      <input
        id="lastName"
        type="text"
        formControlName="lastName"
        placeholder="e.g., Chen"
        class="w-full px-4 py-2.5 text-sm border rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 placeholder-slate-400"
        [class.border-red-400]="form.get('lastName')?.touched && form.get('lastName')?.invalid"
        [class.border-slate-200]="!(form.get('lastName')?.touched && form.get('lastName')?.invalid)"
      />
      <p *ngIf="form.get('lastName')?.touched && form.get('lastName')?.invalid" class="text-xs text-red-500 mt-1">
        Last name is required.
      </p>
    </div>
  </div>

  <!-- Job Title -->
  <div>
    <label for="jobTitle" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
      Job Title <span class="text-red-500">*</span>
    </label>
    <div class="relative">
      <div class="absolute inset-y-0 right-0 rtl:right-0 rtl:left-auto left-0 pl-3 rtl:pr-3.5 flex items-center pointer-events-none text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      </div>
      <input
        id="jobTitle"
        type="text"
        formControlName="jobTitle"
        placeholder="e.g., Fleet Manager"
        class="w-full pr-10 rtl:pr-10 rtl:pl-4 pl-4 py-2.5 text-sm border rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 placeholder-slate-400"
        [class.border-red-400]="form.get('jobTitle')?.touched && form.get('jobTitle')?.invalid"
        [class.border-slate-200]="!(form.get('jobTitle')?.touched && form.get('jobTitle')?.invalid)"
      />
    </div>
    <p *ngIf="form.get('jobTitle')?.touched && form.get('jobTitle')?.invalid" class="text-xs text-red-500 mt-1">
      Job title is required.
    </p>
  </div>

  <!-- Work Email -->
  <div>
    <label for="email" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
      Work Email <span class="text-red-500">*</span>
    </label>
    <div class="relative">
      <div class="absolute inset-y-0 right-0 rtl:right-0 rtl:left-auto left-0 pl-3 rtl:pr-3.5 flex items-center pointer-events-none text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="you@company.com"
        class="w-full pr-10 rtl:pr-10 rtl:pl-4 pl-4 py-2.5 text-sm border rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 placeholder-slate-400"
        [class.border-red-400]="form.get('email')?.touched && form.get('email')?.invalid"
        [class.border-slate-200]="!(form.get('email')?.touched && form.get('email')?.invalid)"
      />
    </div>
    <p *ngIf="form.get('email')?.touched && form.get('email')?.invalid" class="text-xs text-red-500 mt-1">
      Please enter a valid work email address.
    </p>
  </div>

  <!-- Phone Number (Optional) -->
  <div>
    <label for="phone" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
      Phone Number
    </label>
    <div class="relative">
      <div class="absolute inset-y-0 right-0 rtl:right-0 rtl:left-auto left-0 pl-3 rtl:pr-3.5 flex items-center pointer-events-none text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
      <input
        id="phone"
        type="tel"
        formControlName="phone"
        placeholder="+1 (555) 000-0000"
        class="w-full pr-10 rtl:pr-10 rtl:pl-4 pl-4 py-2.5 text-sm border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 placeholder-slate-400"
      />
    </div>
  </div>

  <!-- Action Buttons (app-button) -->
  <div class="flex gap-3 pt-4">
    <!-- Back Button -->
    <app-button
      variant="secondary"
      type="button"
      (clicked)="onBack()"
      class="w-1/3 block"
    >
      <span class="flex items-center justify-center gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 rtl:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span>Back</span>
      </span>
    </app-button>

    <!-- Next Button -->
    <app-button
      variant="primary"
      type="submit"
      class="flex-1 block"
    >
      <span class="flex items-center justify-center gap-2">
        <span>Continue</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 rtl:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </span>
    </app-button>
  </div>

</form>
