<form [formGroup]="form" (ngSubmit)="onNext()" class="space-y-4">

  <!-- Step Header -->
  <div class="mb-4">
    <h2 class="text-lg font-bold text-slate-900">Company Info</h2>
    <p class="text-xs text-slate-500">Enter your company details to begin account verification.</p>
  </div>

  <!-- Company Name -->
  <div>
    <label for="companyName" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
      Company Name <span class="text-red-500">*</span>
    </label>
    <div class="relative">
      <div class="absolute inset-y-0 right-0 rtl:right-0 rtl:left-auto left-0 pl-3 rtl:pr-3.5 flex items-center pointer-events-none text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="22" x2="9" y2="22.01"/><line x1="15" y1="22" x2="15" y2="22.01"/><line x1="12" y1="22" x2="12" y2="22.01"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="4" y1="10" x2="20" y2="10"/></svg>
      </div>
      <input
        id="companyName"
        type="text"
        formControlName="companyName"
        placeholder="e.g., TerraEquip LLC"
        class="w-full pr-10 rtl:pr-10 rtl:pl-4 pl-4 py-2.5 text-sm border rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 placeholder-slate-400"
        [class.border-red-400]="form.get('companyName')?.touched && form.get('companyName')?.invalid"
        [class.border-slate-200]="!(form.get('companyName')?.touched && form.get('companyName')?.invalid)"
      />
    </div>
    <p *ngIf="form.get('companyName')?.touched && form.get('companyName')?.invalid" class="text-xs text-red-500 mt-1">
      Company name is required.
    </p>
  </div>

  <!-- Industry Select -->
  <div>
    <label for="industry" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
      Industry <span class="text-red-500">*</span>
    </label>
    <select
      id="industry"
      formControlName="industry"
      class="w-full px-4 py-2.5 text-sm border rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 appearance-none"
      [class.border-red-400]="form.get('industry')?.touched && form.get('industry')?.invalid"
      [class.border-slate-200]="!(form.get('industry')?.touched && form.get('industry')?.invalid)"
    >
      <option value="" disabled selected>Select industry</option>
      <option *ngFor="let ind of industries" [value]="ind">{{ ind }}</option>
    </select>
    <p *ngIf="form.get('industry')?.touched && form.get('industry')?.invalid" class="text-xs text-red-500 mt-1">
      Please select an industry.
    </p>
  </div>

  <!-- Grid: Company Size & Country -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <!-- Company Size -->
    <div>
      <label for="companySize" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
        Company Size <span class="text-red-500">*</span>
      </label>
      <select
        id="companySize"
        formControlName="companySize"
        class="w-full px-4 py-2.5 text-sm border rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 appearance-none"
        [class.border-red-400]="form.get('companySize')?.touched && form.get('companySize')?.invalid"
        [class.border-slate-200]="!(form.get('companySize')?.touched && form.get('companySize')?.invalid)"
      >
        <option value="" disabled selected>Select size</option>
        <option *ngFor="let size of companySizes" [value]="size">{{ size }}</option>
      </select>
    </div>

    <!-- Country -->
    <div>
      <label for="country" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
        Country <span class="text-red-500">*</span>
      </label>
      <select
        id="country"
        formControlName="country"
        class="w-full px-4 py-2.5 text-sm border rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 appearance-none"
      >
        <option *ngFor="let cnt of countries" [value]="cnt">{{ cnt }}</option>
      </select>
    </div>
  </div>

  <!-- Company Website (Optional) -->
  <div>
    <label for="website" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">
      Company Website
    </label>
    <div class="relative">
      <div class="absolute inset-y-0 right-0 rtl:right-0 rtl:left-auto left-0 pl-3 rtl:pr-3.5 flex items-center pointer-events-none text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <input
        id="website"
        type="url"
        formControlName="website"
        placeholder="https://yourcompany.com"
        class="w-full pr-10 rtl:pr-10 rtl:pl-4 pl-4 py-2.5 text-sm border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-slate-900 placeholder-slate-400"
      />
    </div>
  </div>

  <!-- Step Submit Button (app-button) -->
  <div class="pt-4">
    <app-button
      variant="primary"
      type="submit"
      class="w-full block"
    >
      <span class="flex items-center justify-center gap-2">
        <span>Continue</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 rtl:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </span>
    </app-button>
  </div>

</form>
