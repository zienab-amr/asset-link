<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4 sm:p-6 font-sans dir-ltr rtl:dir-rtl">
  <div class="w-full max-w-[460px] bg-white rounded-[16px] shadow-sm border border-slate-100 p-8 sm:p-10 space-y-6">

    <!-- Header Icon & Titles -->
    <div class="text-center space-y-3">
      <div class="w-14 h-14 rounded-2xl bg-blue-50 border border-blue-100 flex items-center justify-center mx-auto text-blue-600 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
      </div>

      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">
        Verification Code
      </h1>
      <p class="text-sm text-slate-500 leading-relaxed max-w-sm mx-auto">
        A 6-digit security code has been sent to your email:<br>
        <span class="font-semibold text-slate-700 inline-block">{{ userEmail }}</span>
      </p>
    </div>

    <!-- OTP Input Section -->
    <div class="space-y-4 py-2">
      <app-otp-input
        [length]="6"
        [(ngModel)]="otpCode"
        [isInvalid]="isInvalid"
        [disabled]="isLoading || isSuccess"
        (valueChange)="onCodeChange($event)"
        (completed)="onCodeCompleted($event)"
      ></app-otp-input>

      <!-- Error Message Feedback -->
      <div *ngIf="isInvalid && errorMessage" class="p-3.5 bg-red-50 border border-red-200 rounded-xl flex items-start gap-2.5 text-xs text-red-700 animate-fade-in">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-red-600 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Success Feedback -->
      <div *ngIf="isSuccess" class="p-3.5 bg-emerald-50 border border-emerald-200 rounded-xl flex items-center gap-2 text-xs text-emerald-700 font-semibold animate-fade-in">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-emerald-600 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span>Verification successful! Redirecting to dashboard...</span>
      </div>
    </div>

    <!-- Actions Section -->
    <div class="space-y-4 pt-2">
      <!-- Verify Submit Button using app-button -->
      <app-button
        variant="primary"
        type="button"
        [disabled]="otpCode.length < 6 || isLoading || isSuccess"
        (clicked)="verifyOtp()"
        class="w-full block"
      >
        <span *ngIf="!isLoading">Verify Code</span>
        <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
          <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          Verifying...
        </span>
      </app-button>

      <!-- Resend Timer Section -->
      <div class="flex items-center justify-between text-xs text-slate-500 pt-2 border-t border-slate-100">
        <span class="flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <ng-container *ngIf="!canResend">
            Resend code in: <strong class="font-mono font-bold text-slate-700">{{ formatTimer(countdown) }}</strong>
          </ng-container>
          <ng-container *ngIf="canResend">
            Didn't receive the code?
          </ng-container>
        </span>

        <!-- Resend Code app-button -->
        <app-button
          variant="ghost"
          type="button"
          [disabled]="!canResend || isLoading"
          (clicked)="resendCode()"
        >
          Resend Code
        </app-button>
      </div>
    </div>

  </div>
</div>
