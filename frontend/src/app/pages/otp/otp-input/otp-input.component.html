<div
  class="flex items-center justify-center gap-2 dir-ltr rtl:flex-row-reverse"
  [class.opacity-50]="disabled"
  [class.pointer-events-none]="disabled"
>
  <ng-container *ngFor="let digit of digits; let i = index">
    <div class="relative">
      <input
        #otpInput
        type="text"
        inputmode="numeric"
        pattern="[0-9]*"
        maxLength="1"
        [value]="digits[i]"
        [disabled]="disabled"
        (focus)="onFocus(i)"
        (input)="onInput($event, i)"
        (keydown)="onKeyDown($event, i)"
        (paste)="onPaste($event)"
        class="w-12 h-14 text-center text-xl font-bold text-slate-900 bg-slate-50 border rounded-[12px] outline-none transition-all duration-200"
        [ngClass]="{
          'border-red-500 bg-red-50/30 text-red-600 focus:ring-2 focus:ring-red-500/20': isInvalid,
          'border-blue-600 bg-white ring-2 ring-blue-600/20 shadow-sm': activeIndex === i && !isInvalid,
          'border-slate-200 hover:border-slate-300 focus:border-blue-600': activeIndex !== i && !isInvalid
        }"
      />
    </div>

    <!-- Group separator after every 3 digits if length >= 6 -->
    <ng-container *ngIf="length >= 6 && i === Math.floor(length / 2) - 1">
      <span class="text-slate-300 font-bold px-1 select-none">–</span>
    </ng-container>
  </ng-container>
</div>
