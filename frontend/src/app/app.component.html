<div class="min-h-screen bg-page p-8">
  <div class="max-w-5xl mx-auto space-y-10">
    <h1 class="text-2xl font-bold text-text">{{ title }}</h1>

    <!-- ===================== BUTTON COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold text-text mb-4">Button Component</h2>
      <div class="flex flex-wrap gap-3">
        <app-button variant="primary">Save Changes</app-button>
        <app-button variant="secondary">Discard</app-button>
        <app-button variant="success">Accept Offer</app-button>
        <app-button variant="danger">Reject Offer</app-button>
        <app-button variant="primary" [disabled]="true">Disabled</app-button>
      </div>
    </section>

    <!-- ===================== STEPPER COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold text-text mb-6">Stepper Component</h2>
      <app-stepper [steps]="deliverySteps" [currentStep]="currentStep">
      </app-stepper>
    </section>

    <!-- ===================== IMAGE GALLERY COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold text-text mb-4">
        Image Gallery Component
      </h2>
      <app-image-gallery
        [images]="demoImages"
        (filesSelected)="onFilesSelected($event)"
        (imagesChange)="onImagesChange($event)"
      >
      </app-image-gallery>
    </section>

    <!-- ===================== CARD COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold text-text mb-6">Card Component</h2>
      <app-card
        title="Atlas Copco XRHS 1150"
        subtitle="Industrial Air Compressor"
      >
        <div class="space-y-3">
          <p class="text-slate-600 text-sm">Daily Rate</p>
          <p class="text-3xl font-bold text-blue-600">$560</p>
          <button class="px-4 py-2 rounded-lg bg-blue-600 text-white">
            Book Now
          </button>
        </div>
      </app-card>
    </section>

    <!-- ===================== TABS COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold mb-4">Tabs Component</h2>
      <app-tabs
        [tabs]="['Overview', 'Details', 'Maintenance', 'Specifications']"
        [activeTab]="0"
      >
      </app-tabs>
    </section>

    <!-- ===================== STAT CARD COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold mb-6">Stat Card Component</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <app-stat-card title="Total Assets" value="128" icon="📦">
        </app-stat-card>
        <app-stat-card title="Active Rentals" value="42" icon="🚚">
        </app-stat-card>
        <app-stat-card title="Revenue" value="$12K" icon="💰"> </app-stat-card>
      </div>
    </section>

    <!-- ===================== SCORE WIDGET COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold mb-6">Score Widget Component</h2>
      <app-score-widget title="Inspection Score" [score]="94">
      </app-score-widget>
    </section>

    <!-- ===================== QR CODE WIDGET COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold mb-6">QR Code Widget Component</h2>
      <app-qr-code-widget title="Asset QR Code" assetId="AST-2026-001">
      </app-qr-code-widget>
    </section>

    <!-- ===================== DATE RANGE PICKER COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold mb-6">Date Range Picker</h2>
      <app-date-range-picker
        startLabel="Start Date"
        endLabel="End Date"
        [required]="true"
      >
      </app-date-range-picker>
    </section>

    <!-- ===================== PAGINATION COMPONENT ===================== -->
    <section class="bg-white border border-border rounded-card p-6">
      <h2 class="text-lg font-semibold mb-6">Pagination Component</h2>
      <app-pagination
        [currentPage]="1"
        [totalPages]="5"
        [showing]="6"
        [total]="6"
        itemName="contracts"
      >
      </app-pagination>
    </section>

    <!-- ===================== MODAL COMPONENT (Commented) ===================== -->
    <!-- 
    <app-modal
      [isOpen]="true"
      title="New Booking"
      subtitle="Step 1 of 3 · Asset Selection"
      size="lg"
      icon="📤"
    >
      <p class="text-gray-700">
        هنا هيبقى محتوى الـ Modal.
      </p>
    </app-modal> 
    -->

  </div>
</div>
